<svg xmlns="http://www.w3.org/2000/svg" width="320" height="580" viewBox="0 0 320 580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF7F0"/>
      <stop offset="100%" stop-color="#F5EDE0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="580" rx="20" fill="url(#bg)"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="320" height="30" fill="#E8DCC8" rx="20"/>
  <rect x="0" y="15" width="320" height="15" fill="#E8DCC8"/>
  <!-- Header -->
  <text x="160" y="55" font-family="serif" font-size="18" font-weight="bold" fill="#201A14" text-anchor="middle">Brew Calculator</text>
  <!-- Category chips -->
  <rect x="12" y="68" width="70" height="24" rx="12" fill="#C75B3C"/>
  <text x="47" y="85" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">Pour-over</text>
  <rect x="86" y="68" width="60" height="24" rx="12" fill="#F3D3C4"/>
  <text x="116" y="85" font-family="sans-serif" font-size="10" fill="#C75B3C" text-anchor="middle">Espresso</text>
  <rect x="150" y="68" width="70" height="24" rx="12" fill="#F3D3C4"/>
  <text x="185" y="85" font-family="sans-serif" font-size="10" fill="#C75B3C" text-anchor="middle">Immersion</text>
  <!-- Equipment card -->
  <rect x="12" y="100" width="296" height="44" rx="10" fill="#fff"/>
  <circle cx="30" cy="122" r="12" fill="none" stroke="#C75B3C" stroke-width="2"/>
  <path d="M24,116 L36,116 L30,126 Z" fill="none" stroke="#C75B3C" stroke-width="2"/>
  <text x="50" y="117" font-family="sans-serif" font-size="9" fill="#6E6152">Selected brewer</text>
  <text x="50" y="130" font-family="sans-serif" font-size="13" font-weight="bold" fill="#201A14">Hario V60</text>
  <text x="300" y="126" font-family="sans-serif" font-size="10" fill="#C75B3C" text-anchor="end">▾</text>
  <!-- Ratio mode toggle -->
  <rect x="12" y="156" width="142" height="32" rx="16" fill="#C75B3C"/>
  <text x="83" y="176" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Auto</text>
  <rect x="158" y="156" width="150" height="32" rx="16" fill="#fff" stroke="#E7DDCE" stroke-width="1"/>
  <text x="233" y="176" font-family="sans-serif" font-size="11" fill="#6E6152" text-anchor="middle">Manual</text>
  <!-- Strength card -->
  <rect x="12" y="200" width="296" height="70" rx="10" fill="#fff"/>
  <text x="24" y="222" font-family="sans-serif" font-size="13" font-weight="bold" fill="#201A14">Strength</text>
  <rect x="210" y="212" width="86" height="20" rx="10" fill="#D9B98C"/>
  <text x="253" y="227" font-family="sans-serif" font-size="9" fill="#201A14" text-anchor="middle">1:16.7 • Balanced</text>
  <rect x="24" y="238" width="272" height="6" rx="3" fill="#E7DDCE"/>
  <rect x="24" y="238" width="140" height="6" rx="3" fill="#D9B98C"/>
  <circle cx="164" cy="241" r="8" fill="#C75B3C"/>
  <text x="24" y="262" font-family="sans-serif" font-size="8" fill="#6E6152">Weaker</text>
  <text x="280" y="262" font-family="sans-serif" font-size="8" fill="#6E6152" text-anchor="end">Stronger</text>
  <!-- Output -->
  <text x="160" y="295" font-family="serif" font-size="10" fill="#6E6152" text-anchor="middle">Coffee</text>
  <text x="160" y="318" font-family="serif" font-size="36" fill="#201A14" text-anchor="middle" font-weight="bold">31.3 g</text>
  <text x="160" y="340" font-family="serif" font-size="10" fill="#6E6152" text-anchor="middle">Water</text>
  <text x="160" y="358" font-family="serif" font-size="22" fill="#201A14" text-anchor="middle">500 ml</text>
  <text x="160" y="375" font-family="sans-serif" font-size="11" fill="#C75B3C" text-anchor="middle">Medium grind • 93°C</text>
  <!-- Buttons -->
  <rect x="12" y="395" width="142" height="42" rx="21" fill="none" stroke="#C75B3C" stroke-width="1.5"/>
  <text x="83" y="421" font-family="sans-serif" font-size="12" fill="#C75B3C" text-anchor="middle">Save</text>
  <rect x="166" y="395" width="142" height="42" rx="21" fill="#C75B3C"/>
  <text x="237" y="421" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle">Start Brew</text>
  <!-- Bottom nav -->
  <rect x="0" y="520" width="320" height="60" fill="#fff"/>
  <text x="32" y="558" font-family="sans-serif" font-size="7" fill="#C75B3C" text-anchor="middle">BREW</text>
  <text x="96" y="558" font-family="sans-serif" font-size="7" fill="#6E6152" text-anchor="middle">GEAR</text>
  <text x="160" y="558" font-family="sans-serif" font-size="7" fill="#6E6152" text-anchor="middle">RECIPES</text>
  <text x="224" y="558" font-family="sans-serif" font-size="7" fill="#6E6152" text-anchor="middle">LOG</text>
  <text x="288" y="558" font-family="sans-serif" font-size="7" fill="#6E6152" text-anchor="middle">LEARN</text>
  <!-- Dots -->
  <circle cx="32" cy="530" r="8" fill="#C75B3C"/>
  <circle cx="96" cy="530" r="8" fill="none" stroke="#E7DDCE" stroke-width="1.5"/>
  <circle cx="160" cy="530" r="8" fill="none" stroke="#E7DDCE" stroke-width="1.5"/>
  <circle cx="224" cy="530" r="8" fill="none" stroke="#E7DDCE" stroke-width="1.5"/>
  <circle cx="288" cy="530" r="8" fill="none" stroke="#E7DDCE" stroke-width="1.5"/>
</svg>
