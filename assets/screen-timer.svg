<svg xmlns="http://www.w3.org/2000/svg" width="320" height="580" viewBox="0 0 320 580">
  <rect width="320" height="580" rx="20" fill="#14100D"/>
  <!-- Status -->
  <rect x="0" y="0" width="320" height="30" fill="#1E1813" rx="20"/>
  <rect x="0" y="15" width="320" height="15" fill="#1E1813"/>
  <!-- Back + Title -->
  <text x="24" y="50" font-family="sans-serif" font-size="14" fill="#B8A895">← Brew Hario V60</text>
  <!-- Progress ring -->
  <circle cx="160" cy="220" r="120" fill="none" stroke="#3A2F26" stroke-width="14"/>
  <circle cx="160" cy="220" r="120" fill="none" stroke="#E0785B" stroke-width="14" stroke-dasharray="565" stroke-dashoffset="220" stroke-linecap="round" transform="rotate(-90 160 220)"/>
  <!-- Countdown -->
  <text x="160" y="210" font-family="serif" font-size="60" font-weight="bold" fill="#F5EDE3" text-anchor="middle">1:42</text>
  <!-- Step counter -->
  <text x="160" y="148" font-family="sans-serif" font-size="11" fill="#B8A895" text-anchor="middle">Step 2 / 5</text>
  <!-- Current step -->
  <text x="160" y="336" font-family="sans-serif" font-size="16" font-weight="bold" fill="#F5EDE3" text-anchor="middle">Pour — 2nd pour</text>
  <text x="160" y="356" font-family="sans-serif" font-size="13" fill="#E0785B" text-anchor="middle">Pour to 300 g</text>
  <!-- Adjust pour -->
  <text x="160" y="380" font-family="sans-serif" font-size="9" fill="#B8A895" text-anchor="middle">Adjust pour</text>
  <rect x="100" y="388" width="30" height="22" rx="11" fill="none" stroke="#3A2F26" stroke-width="1"/>
  <text x="115" y="404" font-family="sans-serif" font-size="10" fill="#B8A895" text-anchor="middle">−</text>
  <text x="160" y="404" font-family="sans-serif" font-size="12" fill="#F5EDE3" text-anchor="middle">300 g</text>
  <rect x="190" y="388" width="30" height="22" rx="11" fill="none" stroke="#3A2F26" stroke-width="1"/>
  <text x="205" y="404" font-family="sans-serif" font-size="10" fill="#B8A895" text-anchor="middle">+</text>
  <!-- Next step preview -->
  <text x="160" y="430" font-family="sans-serif" font-size="11" fill="#B8A895" text-anchor="middle">Next: Drawdown · 0:55</text>
  <!-- Buttons -->
  <rect x="12" y="450" width="142" height="42" rx="21" fill="none" stroke="#E0785B" stroke-width="1.5"/>
  <text x="83" y="476" font-family="sans-serif" font-size="12" fill="#E0785B" text-anchor="middle">Finish</text>
  <rect x="166" y="450" width="142" height="42" rx="21" fill="#E0785B"/>
  <text x="237" y="476" font-family="sans-serif" font-size="12" fill="#1A0F0A" text-anchor="middle">Pause</text>
</svg>
