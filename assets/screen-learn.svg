  <rect x="0" y="15" width="320" height="15" fill="#E8DCC8"/>
  <!-- Title -->
  <text x="160" y="55" font-family="serif" font-size="18" font-weight="bold" fill="#201A14" text-anchor="middle">Learn</text>
  <text x="160" y="72" font-family="sans-serif" font-size="9" fill="#6E6152" text-anchor="middle">Your coffee education journey</text>
  <!-- Step map -->
  <g transform="translate(30, 86)">
    <circle cx="0" cy="0" r="10" fill="#C75B3C"/>
