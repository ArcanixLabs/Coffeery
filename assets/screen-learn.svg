  <rect x="12" y="134" width="296" height="52" rx="10" fill="#fff"/>
  <text x="24" y="154" font-family="sans-serif" font-size="12" font-weight="bold" fill="#201A14">What is Extraction?</text>
  <text x="24" y="172" font-family="sans-serif" font-size="9" fill="#6E6152">Understand how water dissolves coffee compounds to create flavor. Extraction yield…</text>
  <text x="24" y="182" font-family="sans-serif" font-size="9" fill="#C75B3C">Read more</text>
  <circle cx="300" cy="168" r="4" fill="#F3D3C4"/>
  <rect x="12" y="196" width="296" height="44" rx="10" fill="#fff"/>
  <text x="24" y="216" font-family="sans-serif" font-size="12" font-weight="bold" fill="#201A14">Under vs Over Extraction</text>
  <text x="24" y="232" font-family="sans-serif" font-size="9" fill="#6E6152">Learn to identify sour (under) vs bitter (over) extraction…</text>
  <text x="24" y="240" font-family="sans-serif" font-size="9" fill="#C75B3C">Read more</text>
  <!-- Troubleshoot -->
  <text x="24" y="268" font-family="sans-serif" font-size="10" fill="#C75B3C">Tools</text>
  <rect x="12" y="278" width="296" height="56" rx="10" fill="#fff"/>
  <text x="24" y="298" font-family="sans-serif" font-size="12" font-weight="bold" fill="#201A14">Taste Diagnosis</text>
  <text x="24" y="318" font-family="sans-serif" font-size="9" fill="#6E6152">How was your cup? Pick what you tasted…</text>
  <rect x="24" y="326" width="40" height="16" rx="8" fill="#C75B3C"/>
  <text x="44" y="337" font-family="sans-serif" font-size="7" fill="#fff" text-anchor="middle">Sour</text>
  <rect x="68" y="326" width="44" height="16" rx="8" fill="#F3D3C4"/>
  <text x="90" y="337" font-family="sans-serif" font-size="7" fill="#C75B3C" text-anchor="middle">Bitter</text>
  <rect x="116" y="326" width="50" height="16" rx="8" fill="#F3D3C4"/>
  <text x="141" y="337" font-family="sans-serif" font-size="7" fill="#C75B3C" text-anchor="middle">Weak</text>
